<!DOCTYPE html>
<html lang="en">
<script>if(localStorage.getItem('darkMode')==='enabled'){document.documentElement.classList.add('dark-mode');}</script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login to AIPDFLY - Access Pro Features</title>
    <meta name="description" content="Login to your AIPDFLY account to access unlimited PDF tools, AI features, and no ads.">
    <meta name="keywords" content="pdf login, sign in, pdf account, access pro features, pdf tools login">
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://aipdfly.com/login.html">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="dark-mode.css">
    <script src="darkmode.js"></script>
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZWC5YTJ60S"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-ZWC5YTJ60S');
    </script>
    
    <meta name="google-adsense-account" content="ca-pub-YOUR_PUBLISHER_ID">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-YOUR_PUBLISHER_ID" crossorigin="anonymous"></script>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Roboto', sans-serif; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #c7d2fe; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #8b5cf6; }
        
        #darkModeToggle { transition: all 0.2s ease; }
        #darkModeToggle:hover { transform: scale(1.05); }
        
        /* 密码显示切换按钮样式 */
        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            padding: 4px;
            font-size: 18px;
            transition: color 0.2s;
            z-index: 5;
        }
        .password-toggle:hover {
            color: #6b7280;
        }
        .password-toggle:focus {
            outline: none;
        }
        .password-toggle .fa-eye-slash {
            color: #8b5cf6;
        }
        .password-toggle .fa-eye {
            color: #9ca3af;
        }
        .password-wrapper {
            position: relative;
        }
        .password-wrapper input {
            padding-right: 44px;
        }
    </style>
</head>
<body class="bg-gray-50">

    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="container mx-auto px-4 lg:px-8 py-4 flex justify-between items-center flex-wrap gap-4">
            <a href="index.html" class="text-2xl font-bold bg-gradient-to-r from-purple-600 to-blue-600 bg-clip-text text-transparent">AIPDFLY</a>
            <div class="flex items-center gap-2 bg-gray-100 rounded-full p-1">
                <a href="index.html" class="tab-btn px-6 py-2.5 rounded-full text-base font-semibold transition-all text-gray-700 hover:text-purple-600 hover:bg-gray-200"><i class="fas fa-wrench mr-2"></i> Tools</a>
                <a href="blog.html" class="tab-btn px-6 py-2.5 rounded-full text-base font-semibold transition-all text-gray-700 hover:text-purple-600 hover:bg-gray-200"><i class="fas fa-newspaper mr-2"></i> Blog</a>
                <a href="pricing.html" class="tab-btn px-6 py-2.5 rounded-full text-base font-semibold transition-all text-gray-700 hover:text-purple-600 hover:bg-gray-200"><i class="fas fa-tag mr-2"></i> Pricing</a>
            </div>
            <div class="flex items-center gap-4">
                <a href="contact.html" class="text-gray-600 hover:text-purple-600 transition flex items-center gap-1"><i class="fas fa-envelope"></i> Contact</a>
                <a href="help.html" class="text-gray-600 hover:text-purple-600 transition flex items-center gap-1"><i class="fas fa-question-circle"></i> Help</a>
                <button id="darkModeToggle" class="text-gray-600 hover:text-purple-600 transition text-xl w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100"><i class="fas fa-moon"></i></button>
                <div id="userSection"><a href="login.html" class="bg-purple-600 text-white px-5 py-2 rounded-full text-sm font-medium hover:bg-purple-700 transition flex items-center gap-1"><i class="fas fa-user"></i> Login</a></div>
            </div>
        </div>
    </header>

    <div class="container mx-auto px-4 lg:px-8 py-12 max-w-md">
        <div class="bg-white rounded-2xl shadow-md p-8">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fas fa-sign-in-alt text-2xl text-purple-600"></i></div>
                <h1 class="text-2xl font-bold text-gray-800">Welcome Back</h1>
                <p class="text-gray-500 mt-2">Login to your account</p>
            </div>
            
            <form id="loginForm">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" id="email" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500" placeholder="your@email.com">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500" placeholder="Enter your password">
                        <button type="button" id="togglePassword" class="password-toggle" aria-label="Toggle password visibility">
                            <i class="fas fa-eye" id="passwordIcon"></i>
                        </button>
                    </div>
                </div>
                <div id="loadingMsg" class="hidden text-center text-gray-500 mb-4"><i class="fas fa-spinner fa-spin mr-2"></i> Logging in...</div>
                <div id="errorMsg" class="hidden mb-4 p-3 bg-red-50 rounded-lg text-center text-red-600 text-sm"></div>
                <button type="submit" id="submitBtn" class="w-full bg-purple-600 text-white py-3 rounded-lg font-semibold hover:bg-purple-700 transition">Login →</button>
            </form>
            
            <div class="text-center mt-4"><a href="forgot-password.html" class="text-sm text-gray-500 hover:text-purple-600">Forgot password?</a></div>
            <p class="text-center text-sm text-gray-600 mt-6">Don't have an account? <a href="register.html" class="text-purple-600 hover:underline">Sign up</a></p>
        </div>
    </div>

    <div class="container mx-auto px-4 lg:px-8 py-8 max-w-md">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-YOUR_PUBLISHER_ID" data-ad-slot="YOUR_AD_SLOT_ID" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <footer class="bg-gray-800 text-gray-300 py-10 mt-12">
        <div class="container mx-auto px-4 lg:px-8 text-center text-sm">
            <p>&copy; 2026 AIPDFLY. All rights reserved.</p>
            <p class="mt-2">"<a href="privacy-policy.html" class="hover:text-white mx-2 transition">Privacy Policy</a> | <a href="terms-of-service.html" class="hover:text-white mx-2 transition">Terms of Service</a> |
    <a href="cookie-policy.html" class="hover:text-white mx-2 transition">Cookie Policy</a></p>
        </div>
    </footer>

    <script>
        const API_BASE = 'https://api.aipdfly.com';
        
        const currentPage = window.location.pathname.split('/').pop() || 'login.html';
        document.querySelectorAll('.tab-btn').forEach(btn => { const href = btn.getAttribute('href'); if (href === currentPage) { btn.classList.add('bg-purple-600', 'text-white', 'shadow-sm'); btn.classList.remove('text-gray-700'); } else { btn.classList.remove('bg-purple-600', 'text-white', 'shadow-sm'); btn.classList.add('text-gray-700'); } });
        
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submitBtn');
        const loadingMsg = document.getElementById('loadingMsg');
        const errorMsg = document.getElementById('errorMsg');
        const togglePasswordBtn = document.getElementById('togglePassword');
        const passwordIcon = document.getElementById('passwordIcon');
        
        // ========== 密码显示/隐藏切换 ==========
        let isPasswordVisible = false;
        
        togglePasswordBtn?.addEventListener('click', function() {
            isPasswordVisible = !isPasswordVisible;
            
            if (isPasswordVisible) {
                passwordInput.type = 'text';
                passwordIcon.className = 'fas fa-eye-slash';
                passwordIcon.style.color = '#8b5cf6';
                togglePasswordBtn.setAttribute('aria-label', 'Hide password');
            } else {
                passwordInput.type = 'password';
                passwordIcon.className = 'fas fa-eye';
                passwordIcon.style.color = '#9ca3af';
                togglePasswordBtn.setAttribute('aria-label', 'Show password');
            }
        });
        
        // ========== 登录表单提交 ==========
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim().toLowerCase();
            const password = passwordInput.value;
            if (!email || !password) { errorMsg.textContent = 'Please fill in all fields'; errorMsg.classList.remove('hidden'); return; }
            errorMsg.classList.add('hidden');
            loadingMsg.classList.remove('hidden');
            submitBtn.disabled = true;
            try {
                const response = await fetch(`${API_BASE}/api/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'Login failed');
                if (data.success && data.token) {
                    localStorage.setItem('authToken', data.token);
                    localStorage.setItem('userEmail', data.user.email);
                    localStorage.setItem('isPro', data.user.isPro ? 'true' : 'false');
                    window.location.href = 'index.html';
                } else throw new Error('Login failed');
            } catch (error) { errorMsg.textContent = error.message; errorMsg.classList.remove('hidden'); }
            finally { loadingMsg.classList.add('hidden'); submitBtn.disabled = false; }
        });
        
        // ========== 回车键提交 ==========
        passwordInput?.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
