    <script>
        const API_BASE = 'https://pdfhub-api.etiplpl.workers.dev';
        
        const currentPage = window.location.pathname.split('/').pop() || 'blog.html';
        document.querySelectorAll('.tab-btn').forEach(btn => { const href = btn.getAttribute('href'); if (href === currentPage) { btn.classList.add('bg-purple-600', 'text-white', 'shadow-sm'); btn.classList.remove('text-gray-700'); } else { btn.classList.remove('bg-purple-600', 'text-white', 'shadow-sm'); btn.classList.add('text-gray-700'); } });
        
        const userEmail = localStorage.getItem('userEmail');
        const authToken = localStorage.getItem('authToken');
        const isPro = localStorage.getItem('isPro') === 'true';
        const userSection = document.getElementById('userSection');
        
        function initUserMenu() {
            if (!userSection) return;
            if (userEmail && authToken) {
                userSection.innerHTML = `<div class="relative" id="userMenuContainer"><button id="userMenuBtn" class="bg-purple-600 text-white px-4 py-2 rounded-full text-sm font-medium hover:bg-purple-700 transition flex items-center gap-1"><i class="fas fa-user-circle"></i><span>${userEmail.split('@')[0]}</span><i class="fas fa-chevron-down text-xs ml-1"></i></button><div id="userDropdown" class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg z-20 hidden">${isPro ? '<p class="px-4 py-2 text-green-600 text-sm border-b"><i class="fas fa-crown mr-1"></i> Pro Member</p>' : ''}<a href="account.html" class="block px-4 py-2 text-gray-700 hover:bg-gray-100">My Account</a><a href="#" id="logoutBtn" class="block px-4 py-2 text-red-600 hover:bg-gray-100">Logout</a></div></div>`;
                setTimeout(() => {
                    const container = document.getElementById('userMenuContainer');
                    const btn = document.getElementById('userMenuBtn');
                    const dropdown = document.getElementById('userDropdown');
                    if (btn && dropdown) {
                        btn.addEventListener('click', (e) => { e.stopPropagation(); dropdown.classList.toggle('hidden'); });
                        document.addEventListener('click', (e) => { if (container && !container.contains(e.target)) dropdown.classList.add('hidden'); });
                    }
                    const logout = document.getElementById('logoutBtn');
                    if (logout) logout.addEventListener('click', (e) => { e.preventDefault(); localStorage.removeItem('userEmail'); localStorage.removeItem('authToken'); localStorage.removeItem('isPro'); window.location.reload(); });
                }, 100);
            } else {
                userSection.innerHTML = `<a href="login.html" class="bg-purple-600 text-white px-5 py-2 rounded-full text-sm font-medium hover:bg-purple-700 transition flex items-center gap-1"><i class="fas fa-user"></i> Login</a>`;
            }
        }
        initUserMenu();
        
        const GITHUB_REPO_OWNER = "etippei";
        const GITHUB_REPO_NAME = "pdf-tools";
        const GITHUB_LABEL = "blog-post";
        let allPosts = [], currentCategory = "all", currentSearch = "";
        
        async function fetchBlogPosts() { 
            try { 
                const url = `https://api.github.com/repos/${GITHUB_REPO_OWNER}/${GITHUB_REPO_NAME}/issues?labels=${GITHUB_LABEL}&state=open&per_page=50`; 
                const res = await fetch(url); 
                const issues = await res.json(); 
                if(issues.message || !Array.isArray(issues)) return []; 
                return issues.map(issue => { 
                    const meta = parseMetadata(issue.body); 
                    const content = stripMetadata(issue.body); 
                    return { 
                        id: issue.number, 
                        title: issue.title, 
                        date: new Date(issue.created_at).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}), 
                        category: meta.category || "Tip", 
                        excerpt: meta.excerpt || content.slice(0,200)+(content.length>200?"...":""), 
                        image: meta.image || null, 
                        url: `https://github.com/${GITHUB_REPO_OWNER}/${GITHUB_REPO_NAME}/issues/${issue.number}`, 
                        comments: issue.comments 
                    }; 
                }); 
            } catch(e) { return []; } 
        }
        
        function parseMetadata(body) { 
            const meta = {}; 
            if (!body) return meta;
            const lines = body.split('\n'); 
            let inMeta=false, metaEnd=false; 
            for(const line of lines){ 
                if(line.trim()==='---'){ 
                    if(!inMeta){ inMeta=true; continue; }else{ metaEnd=true; break; } 
                } 
                if(inMeta && !metaEnd){ 
                    const match=line.match(/^(\w+):\s*(.*)$/); 
                    if(match) meta[match[1].toLowerCase()]=match[2].trim(); 
                } 
            } 
            return meta; 
        }
        
        function stripMetadata(body) { 
            if (!body) return '';
            const lines=body.split('\n'); 
            let start=0, end=false; 
            for(let i=0;i<lines.length;i++){ 
                if(lines[i].trim()==='---'){ 
                    if(start===0) start=i+1; 
                    else { end=true; start=i+1; break; } 
                } 
            } 
            return end ? lines.slice(start).join('\n') : body; 
        }
        
        function renderPosts(posts) { 
            const filtered = posts.filter(p => (currentCategory==="all" || p.category===currentCategory) && (p.title.toLowerCase().includes(currentSearch.toLowerCase()) || p.excerpt.toLowerCase().includes(currentSearch.toLowerCase()))); 
            const grid=document.getElementById('postsGrid'), spinner=document.getElementById('loadingSpinner'), no=document.getElementById('noResults'); 
            if(filtered.length===0){ grid.classList.add('hidden'); no.classList.remove('hidden'); spinner.classList.add('hidden'); return; } 
            grid.innerHTML=filtered.map(p=>`<div class="blog-card bg-white rounded-2xl shadow-md overflow-hidden hover:shadow-lg"><div class="w-full h-48 bg-gradient-to-r from-purple-100 to-blue-100 flex items-center justify-center"><i class="fas fa-file-pdf text-5xl text-purple-400"></i></div><div class="p-5"><div class="flex items-center gap-2 mb-3"><span class="text-xs font-medium px-2 py-1 bg-purple-100 text-purple-600 rounded-full">${escapeHtml(p.category)}</span><span class="text-xs text-gray-400"><i class="far fa-calendar-alt mr-1"></i>${p.date}</span></div><h3 class="text-xl font-bold text-gray-800 mb-2">${escapeHtml(p.title)}</h3><p class="text-gray-500 mb-4">${escapeHtml(p.excerpt)}</p><a href="${p.url}" target="_blank" rel="noopener noreferrer" class="text-purple-600 font-medium hover:text-purple-700">Read More <i class="fas fa-arrow-right text-sm"></i></a></div></div>`).join(''); 
            grid.classList.remove('hidden'); 
            spinner.classList.add('hidden'); 
            no.classList.add('hidden'); 
        }
        
        function escapeHtml(str) { 
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) { if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; }); 
        }
        
        async function init() { allPosts = await fetchBlogPosts(); renderPosts(allPosts); }
        
        document.getElementById('searchInput')?.addEventListener('input', (e) => { currentSearch = e.target.value; renderPosts(allPosts); });
        document.querySelectorAll('.category-btn').forEach(btn => { btn.addEventListener('click', () => { document.querySelectorAll('.category-btn').forEach(b => { b.classList.remove('bg-purple-600','text-white'); b.classList.add('bg-gray-200','text-gray-700'); }); btn.classList.remove('bg-gray-200','text-gray-700'); btn.classList.add('bg-purple-600','text-white'); currentCategory = btn.getAttribute('data-category'); renderPosts(allPosts); }); });
        init();
    </script>
