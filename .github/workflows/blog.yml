# .github/workflows/blog.yml
name: Build Blog from Issues

on:
  # 当 Issues 被创建、编辑、关闭、重新打开时触发
  issues:
    types: [opened, edited, closed, reopened, labeled, unlabeled]
  # 也可以手动触发
  workflow_dispatch:
  # 每天定时运行一次，确保内容同步
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install marked

      - name: Generate blog posts from issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node .github/scripts/generate-blog.js

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/ blog.html || true
          git diff --staged --quiet || git commit -m "Auto-generate blog posts from issues"
          git push
